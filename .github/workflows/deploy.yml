# .github/workflows/deploy.yml
# Nexo Commodities — CI/CD Pipeline
# Runs on: GitHub push to main/dev
# Deploys to: Self-hosted runner on Ubuntu VM (192.168.1.50)

name: Deploy Nexo Commodities

on:
  push:
    branches:
      - main       # → Production deploy
      - dev        # → Staging deploy (same VM, different port)
  pull_request:
    branches:
      - main       # → Only run tests, no deploy

# Cancel in-progress runs on same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND:  ghcr.io/${{ github.repository_owner }}/nexo-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/nexo-frontend

jobs:

  # ── 1. TEST ────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: self-hosted          # ← your VM runner
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Run tests
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/ -v --tb=short || true   # non-blocking for now

  # ── 2. BUILD BACKEND ──────────────────────────────────
  build-backend:
    name: Build Backend Image
    runs-on: self-hosted
    needs: test
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Use BuildKit cache to speed up builds
          cache-from: type=registry,ref=${{ env.IMAGE_BACKEND }}:buildcache
          cache-to:   type=registry,ref=${{ env.IMAGE_BACKEND }}:buildcache,mode=max

  # ── 3. BUILD FRONTEND ─────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: self-hosted
    needs: test
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build
        working-directory: frontend
        env:
          VITE_API_URL: ${{ github.ref == 'refs/heads/main' && secrets.PROD_API_URL || secrets.STAGING_API_URL }}
          VITE_WS_URL:  ${{ github.ref == 'refs/heads/main' && secrets.PROD_WS_URL  || secrets.STAGING_WS_URL }}
        run: |
          npm ci
          npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

  # ── 4. DEPLOY PRODUCTION (main branch) ───────────────
  deploy-prod:
    name: Deploy → Production
    runs-on: self-hosted
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy with Docker Compose
        env:
          COMPOSE_FILE: docker-compose.prod.yml
          IMAGE_TAG:    sha-${{ github.sha }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINBERT_DEVICE: cpu
        run: |
          # Pull latest images
          docker compose -f docker-compose.prod.yml pull

          # Rolling restart (zero-downtime)
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

          # Copy frontend build to nginx volume
          docker cp frontend/dist/. nexo-nginx:/usr/share/nginx/html/

          # Reload nginx without downtime
          docker exec nexo-nginx nginx -s reload

          echo "✅ Production deploy complete"

      - name: Health check
        run: |
          sleep 5
          curl -sf http://localhost:8000/health || exit 1
          echo "✅ Health check passed"

      - name: Cleanup old images
        run: |
          docker image prune -f --filter "until=48h"

  # ── 5. DEPLOY STAGING (dev branch) ───────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: self-hosted
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist

      - name: Deploy staging
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          docker compose -f docker-compose.staging.yml up -d --remove-orphans
          docker cp frontend/dist/. nexo-nginx-staging:/usr/share/nginx/html/
          docker exec nexo-nginx-staging nginx -s reload
          echo "✅ Staging deploy complete (port 8001)"

  # ── 6. NOTIFY ─────────────────────────────────────────
  notify:
    name: Notify
    runs-on: self-hosted
    needs: [deploy-prod, deploy-staging]
    if: always()

    steps:
      - name: Slack / Discord notification
        if: ${{ always() }}
        run: |
          STATUS="${{ contains(needs.*.result, 'failure') && '❌ FAILED' || '✅ SUCCESS' }}"
          BRANCH="${{ github.ref_name }}"
          SHA="${{ github.sha }}"
          MSG="$STATUS — nexo-commodities [$BRANCH] ${SHA:0:7}"
          echo "$MSG"
          # Uncomment to send to webhook:
          # curl -s -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
          #   -H "Content-Type: application/json" \
          #   -d "{\"content\": \"$MSG\"}"
