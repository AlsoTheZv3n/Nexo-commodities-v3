services:
  postgres:
    image: postgres:16-alpine
    container_name: nexo-postgres-dev
    environment:
      POSTGRES_DB: nexo
      POSTGRES_USER: nexo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - nexo-pgdata-dev:/var/lib/postgresql/data
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexo -d nexo"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  nexo-pgdata-dev:
